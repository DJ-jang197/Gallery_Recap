<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siel - Authentication</title>
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body>
    <main class="page">
      <!-- Visual backdrop used by the letter-burst effect in login.js -->
      <div class="key-burst-backdrop" aria-hidden="true"></div>
      <div class="toast">End-to-end encryption active</div>

      <!-- Main login form container -->
      <section class="card">
        <img src="/seal.png" alt="Siel Logo" class="seal-logo" />
        <h1>Siel</h1>
        <p class="subtitle">Your digital biographer: Recap on your moments.</p>

        <form id="loginForm" class="form">
          <label for="identifier">Username</label>
          <input id="identifier" type="text" placeholder="your.username" required />

          <label for="securityKey">Security Key</label>
          <div class="key-input">
            <input
              id="securityKey"
              type="password"
              placeholder="Enter your security key"
              required
            />
            <button type="button" id="toggleKey" class="eye-btn" aria-label="Show security key" style="font-size: 11px; font-weight: 700;">
              SHOW
            </button>
          </div>

          <button type="submit" class="primary-btn">Authenticate</button>
        </form>
        <p id="loginStatus" class="status" aria-live="polite"></p>

        <p class="footnote">
          Don't have an account?
          <a class="link-btn" href="/signup">Request Access</a>
        </p>
      </section>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
