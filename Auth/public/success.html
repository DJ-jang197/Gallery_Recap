<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siel - Dashboard</title>
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Welcome</h1>
        <p class="subtitle">Select your reflection cadence to begin.</p>
        
        <div class="cadence-selector">
          <button id="cadenceBiWeekly" class="cadence-btn" type="button" aria-pressed="false">
            <span class="icon" style="background: var(--sky-blue); font-size: 14px; font-weight: 700;">2W</span>
            <div>
              <div style="font-size: 15px;">Two-Week Sprint</div>
              <div style="font-size: 11px; font-weight: 400; opacity: 0.6;">Granular reflection</div>
            </div>
          </button>
          <button id="cadenceMonthly" class="cadence-btn" type="button" aria-pressed="false">
            <span class="icon" style="background: var(--peach); font-size: 14px; font-weight: 700;">1M</span>
            <div>
              <div style="font-size: 15px;">Monthly Recap</div>
              <div style="font-size: 11px; font-weight: 400; opacity: 0.6;">Thematic overview</div>
            </div>
          </button>
        </div>

        <button id="proceedBtn" class="primary-btn" disabled>Continue to Journey</button>

        <p class="footnote">
          <a class="link-btn" href="#" id="logoutBtn">Secure Logout</a>
        </p>
      </section>
    </main>

    <script>
      const btnBiWeekly = document.getElementById('cadenceBiWeekly');
      const btnMonthly = document.getElementById('cadenceMonthly');
      const proceedBtn = document.getElementById('proceedBtn');
      const logoutBtn = document.getElementById('logoutBtn');

      let selectedCadence = null;

      function selectCadence(cadence) {
        selectedCadence = cadence;
        if (cadence === 'biweekly') {
          btnBiWeekly.classList.add('active');
          btnBiWeekly.setAttribute('aria-pressed', 'true');
          btnMonthly.classList.remove('active');
          btnMonthly.setAttribute('aria-pressed', 'false');
        } else {
          btnMonthly.classList.add('active');
          btnMonthly.setAttribute('aria-pressed', 'true');
          btnBiWeekly.classList.remove('active');
          btnBiWeekly.setAttribute('aria-pressed', 'false');
        }
        
        localStorage.setItem('siel_cadence', cadence);
        proceedBtn.disabled = false;
      }

      btnBiWeekly.addEventListener('click', () => selectCadence('biweekly'));
      btnMonthly.addEventListener('click', () => selectCadence('monthly'));

      proceedBtn.addEventListener('click', () => {
        if (!selectedCadence) return;
        window.location.href = '/app'; 
      });

      logoutBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        try {
          await fetch('/auth/logout', { method: 'POST' });
          localStorage.removeItem('siel_cadence');
          window.location.href = '/login';
        } catch (err) {
          console.error('Logout failed', err);
        }
      });
      
      const savedCadence = localStorage.getItem('siel_cadence');
      if (savedCadence) {
        selectCadence(savedCadence);
      }
    </script>
  </body>
</html>
